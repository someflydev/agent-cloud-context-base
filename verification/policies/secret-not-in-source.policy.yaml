rule_id: secret-not-in-source
severity: error
description: Source-controlled IaC must reference secrets, not contain secret values.
file_globs:
  - "**/*.tf"
  - "**/*.tfvars"
  - "**/*.ts"
  - "**/*.py"
  - "**/*.go"
  - "**/*.cs"
disallowed_patterns:
  - AKIA[0-9A-Z]{16}
  - ghp_[A-Za-z0-9_]{20,}
  - github_pat_[A-Za-z0-9_]{20,}
  - BEGIN PRIVATE KEY
fix_hint: Move values to the cloud secret manager or encrypted stack config.

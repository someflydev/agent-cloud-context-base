rule_id: no-checked-in-tfvars-or-pulumi-secrets
severity: warning
description: Local Terraform tfvars and encrypted Pulumi config must not be checked in.
file_globs:
  - "**/terraform.tfvars"
  - "**/pulumi.config.encrypted.yaml"
disallowed_patterns:
  - ".*"
fix_hint: Commit examples only, and keep real env config in CI or secret stores.

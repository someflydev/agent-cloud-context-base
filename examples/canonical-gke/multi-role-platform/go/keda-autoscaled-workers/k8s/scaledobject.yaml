apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rag-asset-preprocessor
  namespace: accb-gke-platform
spec:
  scaleTargetRef:
    name: multi-role-platform-worker
  minReplicaCount: 0
  maxReplicaCount: 12
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: gcp-pubsub
      metadata:
        subscriptionName: accb-gcp-dev-assets
        mode: SubscriptionSize
        value: "10"

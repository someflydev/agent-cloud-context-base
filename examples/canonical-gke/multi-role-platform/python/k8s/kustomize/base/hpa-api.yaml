apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: multi-role-platform-api
  namespace: accb-gke-platform
spec:
  minReplicas: 2
  maxReplicas: 6
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: multi-role-platform-api
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

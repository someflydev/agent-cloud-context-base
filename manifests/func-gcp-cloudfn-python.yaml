schema_version: 2
name: func-gcp-cloudfn-python
description: GCP Cloud Functions Python repository profile for one HTTP, CloudEvent, storage, Pub/Sub, or scheduled handler with Pulumi Python and isolated dev/test resources.
archetype: cloud-function-repo
primary_stack: gcp-cloudfn-python
secondary_stacks:
  - secrets-gcp-secret-manager
  - storage-gcp-gcs-firestore-cloudsql
  - identity-gcp-iam-sa
  - observability-otel-cloud
  - iac-pulumi-python
provider: gcp
runtime_tier: function
primary_language: python
generated_repo_target: true
iac_tool: pulumi-python
triggers:
  - GCP Cloud Functions Python handler
  - Cloud Storage event function
  - Pub/Sub Python function
aliases:
  - cloudfn-python
  - gcp-python-function
scenario_patterns:
  - function.object-intake-enrichment
  - function.scheduled-report-or-maintenance
required_context:
  - context/doctrine/function-vs-container-vs-k8s.md
  - context/doctrine/iac-dev-test-isolation.md
  - context/doctrine/trigger-boundary-discipline.md
  - context/doctrine/idempotency-and-replay.md
  - context/doctrine/cloud-secret-handling.md
  - context/stacks/gcp-cloudfn-python.md
  - context/stacks/iac-pulumi-python.md
  - context/archetypes/cloud-function-repo.md
  - context/scenarios/scenario-profile-map.yaml
optional_context:
  - context/doctrine/serverless-state-discipline.md
  - context/workflows/add-gcp-cloud-function-trigger.md
preferred_examples:
  - examples/canonical-gcp-functions/gcs-trigger-ocr-to-firestore/
recommended_templates:
  - templates/agent-md/AGENT.template.md
  - templates/claude-md/CLAUDE.template.md
  - templates/function/gcp-cloudfn/python/
  - templates/iac/pulumi/python/gcp/
repo_signals:
  - main.py
  - requirements.txt
  - iac/pulumi/python/Pulumi.yaml
task_hints:
  - add-cloud-function
  - add-gcp-cloud-function-trigger
  - add-iac-isolation-pair
  - add-secret-binding
  - add-cloud-integration-tests
warnings:
  - Declare separate dev and test service accounts before binding Cloud Functions triggers.
bootstrap_defaults:
  - include_iac_dev_test_pair
  - include_smoke_tests
  - include_integration_tests
  - include_secret_binding_example
  - include_observability_bundle
iac_layout:
  root_dir: iac/pulumi/python
  dev_path: iac/pulumi/python/Pulumi.dev.yaml
  test_path: iac/pulumi/python/Pulumi.test.yaml
  state_backend: pulumi-cloud
env_isolation:
  env_var_prefix_dev: ACCB_GCP_CLOUDFN_PY_DEV_
  env_var_prefix_test: ACCB_GCP_CLOUDFN_PY_TEST_
  secret_path_dev: projects/PROJECT_ID/secrets/accb-dev-cloudfn-python
  secret_path_test: projects/PROJECT_ID/secrets/accb-test-cloudfn-python
cloud_integration_test_strategy: emulator
cost_band_per_test_run: "$0-$5/run; emulator covers most"
smoke_test_expectations:
  - Invoke the Functions Framework or emulator with a real CloudEvent fixture.
  - Assert storage or Pub/Sub side effects use environment-specific resources.
prompt_first_support: supported

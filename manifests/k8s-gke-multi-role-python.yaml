schema_version: 2
name: k8s-gke-multi-role-python
description: GCP GKE Python multi-role platform profile with API, worker, job, cron, and control-plane workloads plus Terraform IaC and GCP managed bindings.
archetype: k8s-platform-repo
primary_stack: gke-base
secondary_stacks: [k8s-api-workload, k8s-worker-workload, k8s-job-workload, k8s-cronjob-workload, k8s-control-plane-workload, k8s-helm-conventions, k8s-keda-autoscaling, k8s-otel-collector, identity-gcp-iam-sa, secrets-gcp-secret-manager, eventing-gcp-pubsub, storage-gcp-gcs-firestore-cloudsql, iac-terraform-gcp, iac-terraform-conventions]
provider: gcp
runtime_tier: k8s
primary_language: python
generated_repo_target: true
iac_tool: terraform
triggers: [GKE Python platform, GCP Kubernetes multi-role backend]
aliases: [gke-python-platform, gcp-k8s-python]
scenario_patterns: [k8s.multi-role-platform, k8s.rag-knowledge-mesh, k8s.regulated-document-platform, k8s.heterogeneous-compute-platform]
required_context: [context/doctrine/function-vs-container-vs-k8s.md, context/doctrine/k8s-workload-role-separation.md, context/doctrine/eventing-and-dlq-discipline.md, context/doctrine/identity-and-least-privilege.md, context/doctrine/iac-dev-test-isolation.md, context/stacks/gke-base.md, context/stacks/iac-terraform-gcp.md, context/archetypes/k8s-platform-repo.md, context/scenarios/scenario-profile-map.yaml]
optional_context: [context/workflows/add-k8s-workload-role.md, context/workflows/add-vector-store-integration.md, context/workflows/add-observability-bundle.md]
preferred_examples: [examples/canonical-gke/multi-role-platform/]
recommended_templates: [templates/agent-md/AGENT.template.md, templates/claude-md/CLAUDE.template.md, templates/k8s/gke-python/, templates/iac/terraform/gcp/]
repo_signals: [charts/, k8s/overlays/dev, iac/terraform/dev/main.tf]
task_hints: [add-k8s-workload-role, add-helm-or-kustomize-overlay, add-eventing-seam, add-iac-isolation-pair, add-cloud-integration-tests]
warnings: [Workload Identity service accounts and Pub/Sub topics must be environment-specific.]
bootstrap_defaults: [include_iac_dev_test_pair, include_smoke_tests, include_integration_tests, include_secret_binding_example, include_observability_bundle]
iac_layout: {root_dir: iac/terraform, dev_path: iac/terraform/dev, test_path: iac/terraform/test, state_backend: gcs}
env_isolation: {env_var_prefix_dev: ACCB_GKE_PY_DEV_, env_var_prefix_test: ACCB_GKE_PY_TEST_, secret_path_dev: projects/PROJECT_ID/secrets/accb-dev-gke-python, secret_path_test: projects/PROJECT_ID/secrets/accb-test-gke-python}
cloud_integration_test_strategy: ephemeral_real
cost_band_per_test_run: "$5-$50/run depending on cluster lifetime"
smoke_test_expectations: [kubectl can reach the GKE test cluster, Workload Identity and secret binding resolve for one workload role.]
prompt_first_support: supported

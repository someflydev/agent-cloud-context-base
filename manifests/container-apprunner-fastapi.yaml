schema_version: 2
name: container-apprunner-fastapi
description: AWS App Runner FastAPI service profile for a managed container API with Pulumi Python IaC, AWS storage, secret, identity, and observability bindings.
archetype: managed-container-service
primary_stack: apprunner-python-fastapi
secondary_stacks: [secrets-aws-secrets-manager, storage-aws-s3-dynamodb-rds, identity-aws-iam, observability-otel-cloud, iac-pulumi-python]
provider: aws
runtime_tier: managed_container
primary_language: python
generated_repo_target: true
iac_tool: pulumi-python
triggers: [AWS App Runner FastAPI service, AWS managed container API]
aliases: [apprunner-fastapi, aws-fastapi-service]
scenario_patterns: [container.public-api-private-worker-job, container.heavy-runtime-service, container.multi-container-sidecar]
required_context: [context/doctrine/function-vs-container-vs-k8s.md, context/doctrine/container-image-discipline.md, context/doctrine/iac-dev-test-isolation.md, context/doctrine/cloud-secret-handling.md, context/stacks/apprunner-python-fastapi.md, context/stacks/iac-pulumi-python.md, context/archetypes/managed-container-service.md, context/scenarios/scenario-profile-map.yaml]
optional_context: [context/workflows/add-managed-container-service.md, context/workflows/add-vpc-private-network-path.md]
preferred_examples: [examples/canonical-apprunner/public-api-private-worker-job/]
recommended_templates: [templates/agent-md/AGENT.template.md, templates/claude-md/CLAUDE.template.md, templates/container/apprunner/python-fastapi/, templates/iac/pulumi/python/aws/]
repo_signals: [app/main.py, Dockerfile, apprunner.yaml, iac/pulumi/python/Pulumi.yaml]
task_hints: [add-managed-container-service, add-cloud-runtime-image, add-vpc-private-network-path, add-iac-isolation-pair, add-cloud-integration-tests]
warnings: [App Runner requires real ephemeral integration tests; avoid long dwell time.]
bootstrap_defaults: [include_iac_dev_test_pair, include_smoke_tests, include_integration_tests, include_secret_binding_example, include_observability_bundle]
iac_layout: {root_dir: iac/pulumi/python, dev_path: iac/pulumi/python/Pulumi.dev.yaml, test_path: iac/pulumi/python/Pulumi.test.yaml, state_backend: pulumi-cloud}
env_isolation: {env_var_prefix_dev: ACCB_APPRUNNER_FASTAPI_DEV_, env_var_prefix_test: ACCB_APPRUNNER_FASTAPI_TEST_, secret_path_dev: /accb/dev/aws/apprunner-fastapi/, secret_path_test: /accb/test/aws/apprunner-fastapi/}
cloud_integration_test_strategy: ephemeral_real
cost_band_per_test_run: "$1-$15/run depending on dwell time"
smoke_test_expectations: [Build and publish the service image, Exercise App Runner health and one API route.]
prompt_first_support: supported

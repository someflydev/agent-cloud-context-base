schema_version: 2
name: container-cloudrun-fastapi
description: GCP Cloud Run FastAPI service profile for a managed container API with Pulumi Python IaC, GCP storage, identity, secret, and observability bindings.
archetype: managed-container-service
primary_stack: cloudrun-python-fastapi
secondary_stacks:
  - secrets-gcp-secret-manager
  - storage-gcp-gcs-firestore-cloudsql
  - identity-gcp-iam-sa
  - observability-otel-cloud
  - iac-pulumi-python
provider: gcp
runtime_tier: managed_container
primary_language: python
generated_repo_target: true
iac_tool: pulumi-python
triggers: [Cloud Run FastAPI service, GCP managed container API]
aliases: [cloudrun-fastapi, gcp-fastapi-service]
scenario_patterns: [container.public-api-private-worker-job, container.heavy-runtime-service, container.multi-container-sidecar]
required_context:
  - context/doctrine/function-vs-container-vs-k8s.md
  - context/doctrine/container-image-discipline.md
  - context/doctrine/iac-dev-test-isolation.md
  - context/doctrine/cloud-secret-handling.md
  - context/stacks/cloudrun-python-fastapi.md
  - context/stacks/iac-pulumi-python.md
  - context/archetypes/managed-container-service.md
  - context/scenarios/scenario-profile-map.yaml
optional_context: [context/workflows/add-managed-container-service.md, context/workflows/add-cloud-runtime-image.md]
preferred_examples: [examples/canonical-cloudrun/public-api-private-worker-job/]
recommended_templates: [templates/agent-md/AGENT.template.md, templates/claude-md/CLAUDE.template.md, templates/container/cloudrun/python-fastapi/, templates/iac/pulumi/python/gcp/]
repo_signals: [app/main.py, Dockerfile, iac/pulumi/python/Pulumi.yaml]
task_hints: [add-managed-container-service, add-cloud-runtime-image, add-iac-isolation-pair, add-cloud-smoke-tests, add-cloud-integration-tests]
warnings: [Cloud Run has no credible local emulator; use short-lived real test revisions for full integration.]
bootstrap_defaults: [include_iac_dev_test_pair, include_smoke_tests, include_integration_tests, include_secret_binding_example, include_observability_bundle]
iac_layout: {root_dir: iac/pulumi/python, dev_path: iac/pulumi/python/Pulumi.dev.yaml, test_path: iac/pulumi/python/Pulumi.test.yaml, state_backend: pulumi-cloud}
env_isolation: {env_var_prefix_dev: ACCB_CLOUDRUN_FASTAPI_DEV_, env_var_prefix_test: ACCB_CLOUDRUN_FASTAPI_TEST_, secret_path_dev: projects/PROJECT_ID/secrets/accb-dev-cloudrun-fastapi, secret_path_test: projects/PROJECT_ID/secrets/accb-test-cloudrun-fastapi}
cloud_integration_test_strategy: ephemeral_real
cost_band_per_test_run: "$1-$15/run depending on dwell time"
smoke_test_expectations: [Build the image and deploy a dev or test revision, Exercise health and one representative route through Cloud Run.]
prompt_first_support: supported

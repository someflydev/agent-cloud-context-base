schema_version: 2
name: container-cloudrun-hono
description: GCP Cloud Run Hono service profile for a TypeScript managed container API with Pulumi TypeScript IaC and isolated GCP managed-service bindings.
archetype: managed-container-service
primary_stack: cloudrun-typescript-hono
secondary_stacks: [secrets-gcp-secret-manager, storage-gcp-gcs-firestore-cloudsql, identity-gcp-iam-sa, observability-otel-cloud, iac-pulumi-typescript]
provider: gcp
runtime_tier: managed_container
primary_language: typescript
generated_repo_target: true
iac_tool: pulumi-typescript
triggers: [Cloud Run Hono service, TypeScript managed container API]
aliases: [cloudrun-hono, gcp-hono-service]
scenario_patterns: [container.heavy-runtime-service, container.public-api-private-worker-job]
required_context: [context/doctrine/function-vs-container-vs-k8s.md, context/doctrine/container-image-discipline.md, context/doctrine/iac-dev-test-isolation.md, context/doctrine/cloud-secret-handling.md, context/stacks/cloudrun-typescript-hono.md, context/stacks/iac-pulumi-typescript.md, context/archetypes/managed-container-service.md, context/scenarios/scenario-profile-map.yaml]
optional_context: [context/workflows/add-managed-container-service.md, context/workflows/add-cloud-runtime-image.md]
preferred_examples: [examples/canonical-cloudrun/heavy-runtime-service/]
recommended_templates: [templates/agent-md/AGENT.template.md, templates/claude-md/CLAUDE.template.md, templates/container/cloudrun/typescript-hono/, templates/iac/pulumi/typescript/gcp/]
repo_signals: [src/index.ts, package.json, Dockerfile, iac/pulumi/typescript/Pulumi.yaml]
task_hints: [add-managed-container-service, add-cloud-runtime-image, add-iac-isolation-pair, add-cloud-smoke-tests, add-cloud-integration-tests]
warnings: [Use environment-scoped Cloud Run service names and Secret Manager references.]
bootstrap_defaults: [include_iac_dev_test_pair, include_smoke_tests, include_integration_tests, include_secret_binding_example, include_observability_bundle]
iac_layout: {root_dir: iac/pulumi/typescript, dev_path: iac/pulumi/typescript/Pulumi.dev.yaml, test_path: iac/pulumi/typescript/Pulumi.test.yaml, state_backend: pulumi-cloud}
env_isolation: {env_var_prefix_dev: ACCB_CLOUDRUN_HONO_DEV_, env_var_prefix_test: ACCB_CLOUDRUN_HONO_TEST_, secret_path_dev: projects/PROJECT_ID/secrets/accb-dev-cloudrun-hono, secret_path_test: projects/PROJECT_ID/secrets/accb-test-cloudrun-hono}
cloud_integration_test_strategy: ephemeral_real
cost_band_per_test_run: "$1-$15/run depending on dwell time"
smoke_test_expectations: [Build the Hono container image, Exercise readiness and one API route on the deployed test revision.]
prompt_first_support: supported

schema_version: 2
name: func-gcp-cloudfn-typescript
description: GCP Cloud Functions TypeScript repository profile for one Node.js function with Pulumi TypeScript IaC, Secret Manager binding, and dev/test isolation.
archetype: cloud-function-repo
primary_stack: gcp-cloudfn-typescript-node
secondary_stacks:
  - secrets-gcp-secret-manager
  - storage-gcp-gcs-firestore-cloudsql
  - identity-gcp-iam-sa
  - observability-otel-cloud
  - iac-pulumi-typescript
provider: gcp
runtime_tier: function
primary_language: typescript
generated_repo_target: true
iac_tool: pulumi-typescript
triggers:
  - GCP Cloud Functions TypeScript handler
  - signed webhook Cloud Function
  - Identity alert Cloud Function
aliases:
  - cloudfn-typescript
  - gcp-node-function
scenario_patterns:
  - function.signed-webhook-orchestrator
  - function.identity-or-alert-trigger
required_context:
  - context/doctrine/function-vs-container-vs-k8s.md
  - context/doctrine/iac-dev-test-isolation.md
  - context/doctrine/trigger-boundary-discipline.md
  - context/doctrine/idempotency-and-replay.md
  - context/doctrine/cloud-secret-handling.md
  - context/stacks/gcp-cloudfn-typescript-node.md
  - context/stacks/iac-pulumi-typescript.md
  - context/archetypes/cloud-function-repo.md
  - context/scenarios/scenario-profile-map.yaml
optional_context:
  - context/doctrine/serverless-state-discipline.md
  - context/workflows/add-gcp-cloud-function-trigger.md
preferred_examples:
  - examples/canonical-gcp-functions/signed-webhook-orchestrator/
recommended_templates:
  - templates/agent-md/AGENT.template.md
  - templates/claude-md/CLAUDE.template.md
  - templates/function/gcp-cloudfn/typescript/
  - templates/iac/pulumi/typescript/gcp/
repo_signals:
  - src/index.ts
  - package.json
  - iac/pulumi/typescript/Pulumi.yaml
task_hints:
  - add-cloud-function
  - add-gcp-cloud-function-trigger
  - add-iac-isolation-pair
  - add-secret-binding
  - add-cloud-smoke-tests
  - add-cloud-integration-tests
warnings:
  - Keep webhook verification secrets and Firestore collections separated by environment.
bootstrap_defaults:
  - include_iac_dev_test_pair
  - include_smoke_tests
  - include_integration_tests
  - include_secret_binding_example
  - include_observability_bundle
iac_layout:
  root_dir: iac/pulumi/typescript
  dev_path: iac/pulumi/typescript/Pulumi.dev.yaml
  test_path: iac/pulumi/typescript/Pulumi.test.yaml
  state_backend: pulumi-cloud
env_isolation:
  env_var_prefix_dev: ACCB_GCP_CLOUDFN_TS_DEV_
  env_var_prefix_test: ACCB_GCP_CLOUDFN_TS_TEST_
  secret_path_dev: projects/PROJECT_ID/secrets/accb-dev-cloudfn-typescript
  secret_path_test: projects/PROJECT_ID/secrets/accb-test-cloudfn-typescript
cloud_integration_test_strategy: emulator
cost_band_per_test_run: "$0-$5/run; emulator covers most"
smoke_test_expectations:
  - Invoke the Node.js function through the emulator or Functions Framework.
  - Verify signed request failures do not emit managed-service side effects.
prompt_first_support: supported
